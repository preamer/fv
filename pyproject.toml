[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "fv"
version = "0.1.0"
description = "A cli tool to change the version of Ansys Fluent .h5 file"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "h5py>=3.16.0",
]

[project.scripts]
fv = "fv.main:main"

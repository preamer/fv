[build-system]
requires = ["setuptools>=83.0.0", "wheel", "pybind11>=3.0.4", "numpy>=2.4.6"]
build-backend = "setuptools.build_meta"

[project]
name = "fv"
version = "0.1.0"
description = "A Python CLI tool to get case settings and display mesh without opening Ansys Fluent"
readme = "README.md"
license = { text = "BSD-3-Clause" }
requires-python = ">=3.11"
dependencies = [
    "h5py>=3.16.0",
    "pybind11>=3.0.4",
    "pyvista>=0.48.4",
    "setuptools>=83.0.0",
    "sexpdata>=1.0.2",
    "tqdm>=4.68.3",
]

[project.scripts]
fv = "fv.main:main"
